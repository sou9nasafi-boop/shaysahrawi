<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشاي الصحراوي الممتاز - ابدأ الرحلة</title>
    
    <!-- Google Fonts: Amiri & Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 
           CSS RESET & BASE STYLES 
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0A0A0A;
            --primary-gold: #C8973A;
            --deep-gold: #8B5E1A;
            --accent-green: #2D6E2D;
            --text-main: #F0E8D8;
            --text-muted: #A89878;
            --font-serif: 'Amiri', serif;
            --font-sans: 'Tajawal', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-sans);
            color: var(--text-main);
        }

        /* 
           SPLASH CONTAINER 
        */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s;
            padding-top: 2rem;
            text-align: center;
        }

        /* 
           BACKGROUND: DESERT NIGHT THEME 
        */
        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #050508 0%, #0a0a0a 100%);
            overflow: hidden;
        }

        /* Dune Silhouette with Golden Edge - Enhanced Visibility */
        .dunes {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, #000000 0%, #1a140a 100%);
            z-index: -1;
            clip-path: polygon(0% 85%, 15% 75%, 35% 90%, 55% 70%, 75% 85%, 100% 65%, 100% 100%, 0% 100%);
            opacity: 1;
            border-top: 2px solid rgba(200, 151, 58, 0.2);
        }

        .dunes-secondary {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 22%;
            background: linear-gradient(to top, #000000 0%, #0f0b05 100%);
            z-index: -1;
            clip-path: polygon(0% 95%, 25% 80%, 50% 95%, 80% 75%, 100% 90%, 100% 100%, 0% 100%);
            opacity: 1;
        }

        /* Subtle Moonlight Glow */
        .moon-glow {
            position: absolute;
            top: -5%;
            right: -5%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(200, 151, 58, 0.08) 0%, rgba(200, 151, 58, 0) 70%);
            z-index: -1;
            border-radius: 50%;
            filter: blur(60px);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Shooting Stars */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(to left, rgba(255,255,255,0), rgba(255,255,255,1));
            opacity: 0;
            z-index: -1;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 1px;
            background: linear-gradient(to left, rgba(255,255,255,1), rgba(255,255,255,0));
            transform: translateX(-100%);
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translate(-400px, 400px) rotate(-45deg); opacity: 0; }
            100% { transform: translate(-400px, 400px) rotate(-45deg); opacity: 0; }
        }

        /* 
           LOGO STYLES 
        */
        .logo-wrapper {
            margin-bottom: 1.5rem;
            position: relative;
            animation: fadeInScale 1s ease forwards;
            opacity: 0;
        }

        .logo-img {
            width: min(280px, 60vw);
            height: auto;
            display: block;
            filter: drop-shadow(0 0 15px rgba(200, 151, 58, 0.4));
        }

        /* Golden Glow behind logo */
        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(200, 151, 58, 0.2) 0%, rgba(200, 151, 58, 0) 70%);
            z-index: -1;
            border-radius: 50%;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 
           TEXT LAYOUT 
        */
        .content {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            max-width: 90%;
        }

        .shop-name {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--primary-gold);
            font-weight: 700;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.4s forwards;
            text-shadow: 0 2px 10px rgba(200, 151, 58, 0.3);
        }

        .divider {
            color: var(--primary-gold);
            font-size: 1.2rem;
            letter-spacing: 0.2rem;
            opacity: 0.6;
            margin: 0.5rem 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
            opacity: 0;
        }

        .main-slogan {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #F0E8D8;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.7s forwards;
        }

        .sub-slogan {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            color: var(--primary-gold);
            opacity: 0;
            animation: fadeUp 0.8s ease 1s forwards;
        }

        /* 
           ENTER BUTTON - MATCHING LOGO GOLD 
        */
        .enter-btn {
            margin-top: 1rem;
            background: linear-gradient(135deg, #C8973A 0%, #8B5E1A 100%);
            color: #000;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 1.1rem;
            padding: 0.9rem 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: fadeUp 0.8s ease 1.3s forwards;
            display: inline-block;
            align-self: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .enter-btn:hover {
            background: linear-gradient(135deg, #E8C06A 0%, #C8973A 100%);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 25px rgba(200, 151, 58, 0.3);
            letter-spacing: 1px;
        }

        /* 
           ANIMATIONS 
        */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 
           FADE OUT STATE 
        */
        .fade-out {
            opacity: 0 !important;
            pointer-events: none;
            visibility: hidden;
        }

        /* 
           RESPONSIVE TWEAKS 
        */
        @media (max-height: 600px) {
            .logo-wrapper { margin-bottom: 0.5rem; }
            .content { gap: 0.8rem; }
            .logo-img { width: min(180px, 40vw); }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <!-- Background Night Theme -->
        <div id="stars-container">
            <div class="moon-glow"></div>
            <div class="dunes"></div>
            <div class="dunes-secondary"></div>
        </div>

        <!-- Logo -->
        <div class="logo-wrapper">
            <!-- Replace logo.png with actual path -->
            <img src="logo.png" alt="الشاي الصحراوي الممتاز" class="logo-img" onerror="this.src='https://i.ibb.co/SXwfnwQd/Logo-de-the-du-de-sert-authentique.png'">
        </div>

        <!-- Content -->
        <div class="content">
            <h1 class="shop-name">الشاي الصحراوي الممتاز</h1>
            
            <div class="divider">✦──────────✦</div>

            <p class="main-slogan">"كل كاس حكاية — وحكايتنا من الصحراء"</p>
            
            <p class="sub-slogan">"أتاي ن الصحرا — اللي شربو ما ينساه"</p>

            <a href="#main" class="enter-btn" id="enter-btn">ابدأ الرحلة</a>
        </div>
    </div>

    <script>
        /**
         * DESERT STARS GENERATION
         */
        const starsContainer = document.getElementById('stars-container');
        const starCount = 80;

        function createStars() {
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Random size
                const size = Math.random() * 2 + 1 + 'px';
                star.style.width = size;
                star.style.height = size;
                
                // Random position
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                
                // Random animation duration and delay
                const duration = Math.random() * 2.5 + 1.5 + 's';
                const delay = Math.random() * 5 + 's';
                star.style.setProperty('--duration', duration);
                star.style.animationDelay = delay;
                
                // Random initial opacity
                star.style.opacity = Math.random() * 0.4 + 0.6;
                
                starsContainer.appendChild(star);
            }
        }

        /**
         * SHOOTING STARS
         */
        function createShootingStars() {
            for (let i = 0; i < 3; i++) {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                
                // Random position
                shootingStar.style.top = Math.random() * 50 + '%';
                shootingStar.style.left = Math.random() * 100 + '%';
                
                // Animation
                shootingStar.style.animation = `shoot 6s infinite ease-in`;
                shootingStar.style.animationDelay = (i * 2) + 's';
                
                starsContainer.appendChild(shootingStar);
            }
        }

        /**
         * BUTTON ACTION: FADE OUT
         */
        const enterBtn = document.getElementById('enter-btn');
        const splashScreen = document.getElementById('splash-screen');

        enterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            splashScreen.classList.add('fade-out');
            
            // Redirect after animation completes
            setTimeout(() => {
                window.location.href = enterBtn.getAttribute('href');
            }, 800);
        });

        // Initialize
        createStars();
        createShootingStars();
    </script>
</body>
</html>
